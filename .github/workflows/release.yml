name: Release Charts

on:
  push:
    branches:
      - main
      - feature/*
      - fix/*

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package all charts
        run: |
          mkdir -p .helm-packages
          for chart in charts/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "Packaging $chart..."
              # Build dependencies if Chart.yaml has dependencies
              if grep -q "dependencies:" "$chart/Chart.yaml"; then
                echo "  Building dependencies for $chart..."
                helm dependency build "$chart" || echo "  Warning: dependency build failed for $chart, skipping"
              fi
              helm package "$chart" -d .helm-packages/ || echo "  Warning: packaging failed for $chart, skipping"
            fi
          done

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate index and publish
        run: |
          # Copy packaged charts to gh-pages
          cp .helm-packages/*.tgz gh-pages/

          # Generate index.yaml (merge with existing if present)
          if [ -f gh-pages/index.yaml ]; then
            helm repo index gh-pages/ --merge gh-pages/index.yaml --url https://crossml.github.io/sourcy-devops-helm-charts/
          else
            helm repo index gh-pages/ --url https://crossml.github.io/sourcy-devops-helm-charts/
          fi

          # Push to gh-pages
          cd gh-pages
          git add .
          git commit -m "Update Helm chart index" || echo "No changes to commit"
          git push origin gh-pages
