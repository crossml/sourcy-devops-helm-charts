name: Release Charts

on:
  push:
    branches:
      - main
      - feature/*
      - fix/*

jobs:
  release:
    permissions:
      contents: write
      pages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package all charts
        run: |
          mkdir -p .helm-packages
          for chart in charts/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "--- Packaging $chart ---"
              # Build dependencies if Chart.yaml has dependencies
              if grep -q "dependencies:" "$chart/Chart.yaml"; then
                echo "  Building dependencies..."
                helm dependency build "$chart" 2>&1 || true
              fi
              helm package "$chart" -d .helm-packages/ 2>&1 || true
            fi
          done
          echo "--- Packaged charts ---"
          ls -la .helm-packages/

      - name: Generate index.yaml
        run: |
          helm repo index .helm-packages/ --url https://crossml.github.io/sourcy-devops-helm-charts/
          echo "--- index.yaml content ---"
          cat .helm-packages/index.yaml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.helm-packages
          keep_files: false
