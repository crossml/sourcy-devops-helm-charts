{{- if .Values.databases.enabled }}
{{- $files := (.Files.Glob "dashboards/databases/*.json") }}
{{- if $files }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-databases
  labels:
    {{- include "grafana-dashboards.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    grafana_folder: "databases"
data:
  {{- range $path, $_ := $files }}
  {{ $path | base }}: |-
    {{ $.Files.Get $path | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
