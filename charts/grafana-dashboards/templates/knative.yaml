{{- if .Values.knative.enabled }}
{{- $files := (.Files.Glob "dashboards/knative/*.json") }}
{{- if $files }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-knative
  labels:
    {{- include "grafana-dashboards.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    grafana_folder: "knative"
data:
  {{- range $path, $_ := $files }}
  {{ $path | base }}: |-
    {{ $.Files.Get $path | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
