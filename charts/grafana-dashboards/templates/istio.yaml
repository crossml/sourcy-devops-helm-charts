{{- if .Values.istio.enabled }}
{{- $files := (.Files.Glob "dashboards/istio/*.json") }}
{{- if $files }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-istio
  labels:
    {{- include "grafana-dashboards.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    grafana_folder: "istio"
data:
  {{- range $path, $_ := $files }}
  {{ $path | base }}: |-
    {{ $.Files.Get $path | nindent 4 }}
  {{- end }}
{{- end }}
---
{{- $files := (.Files.Glob "dashboards/istio-services/*.json") }}
{{- if $files }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-istio-services
  labels:
    {{- include "grafana-dashboards.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    grafana_folder: "istio-services"
data:
  {{- range $path, $_ := $files }}
  {{ $path | base }}: |-
    {{ $.Files.Get $path | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
